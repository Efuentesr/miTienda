    <div class="container">
      <div class="container container-sm d-flex flex-column header">
        <h1 class="title text-center mb-4">Registrar una cuenta nueva</h1>
        <div class="card p-2">
          <div class="card-body">
            <h5 class="card-title">Ingrese su información</h5>
            <form action="./welcome.html" id="register">
              <div class="form-group">
                <label for="name">Nombre</label>
                <input
                  type="text"
                  name="name"
                  id="name"
                  class="form-control"
                  placeholder="Ingrese su nombre completo"
                />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="form-control"
                  placeholder="Ingrese su email"
                />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  name="password"
                  id="password"
                  class="form-control"
                  placeholder="Ingrese su password"
                />
              </div>
              <div class="form-group">
                <label for="password">Confirmar Password</label>
                <input
                  type="password"
                  name="confirmPassword"
                  id="confirmPassword"
                  class="form-control"
                  placeholder="Confirme Password ingresado"
                />
              </div>
              <div class="form-group">
                <button class="btn btn-primary" type="submit">Registrar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="../nav.js"></script>
    <script src="./registerFormValidation.js"></script>
