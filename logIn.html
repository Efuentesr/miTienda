        <a class="navbar-brand" href="./index.html">

          <li class="nav-item mx-1">

              <label for="search"><i style="font-size: 20px;" class="fa-solid fa-magnifying-glass"></i></label>
              <input id="search" type="text">
            </div>

        </ul>

          <i id="efrm" class="fa-solid fa-bars"></i>

    <!--  -->

    <div class="container d-flex flex-column header">
      <div class="container container-sm">
        <h1 class="title text-center mb-4">Ingreso</h1>
        <div class="card p-2">
          <div class="card-body">
            <h5 class="card-title">Ingrese su informacion</h5>
            <form action="./welcome.html" id="logIn">
              <div class="form-group">
                <label for="email">Email</label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="form-control"
                  placeholder="Ingrese su email"
                />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  name="password"
                  id="password"
                  class="form-control"
                  placeholder="Ingrese su password"
                />
              </div>
              <div class="form-group">
                <button class="btn btn-primary" type="submit">Ingresar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- FOOTER -->

    <script src="./nav.js"></script>
